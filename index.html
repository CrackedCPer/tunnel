<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<meta http-equiv="refresh" content="0; url=https://api.trycloudflare.com">
<title>Redirecting…</title>
<style>
  body {
    font-family: system-ui, -apple-system, sans-serif; color: #e6edf7; background: #0a0f18;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    margin: 0; text-align: center;
  }
  a { color: #ffd54f; }
  .muted { color: #7f97bd; font-size: 0.9rem; margin-top: 0.5rem; }
</style>
</head>
<body>
  <!-- Agnostic redirector: this repo knows nothing about what it points to.
       https://api.trycloudflare.com is rewritten on every server (re)start by update-redirect.sh,
       so this stable Pages link always forwards to the current tunnel. -->
  <div>
    <p>Redirecting…<br>
    <a href="https://api.trycloudflare.com">Continue &rarr;</a></p>
    <p class="muted">If you are not redirected automatically, tap the link above.</p>
  </div>
  <script>location.replace('https://api.trycloudflare.com');</script>
</body>
</html>
